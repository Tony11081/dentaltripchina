# DentalTripChina primary domain Nginx config for Next.js app

server {
    listen 80;
    server_name dentaltripchina.com www.dentaltripchina.com;
    return 301 https://dentaltripchina.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.dentaltripchina.com;

    ssl_certificate     /etc/letsencrypt/live/dentaltripchina.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dentaltripchina.com/privkey.pem;

    return 301 https://dentaltripchina.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dentaltripchina.com;

    ssl_certificate     /etc/letsencrypt/live/dentaltripchina.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dentaltripchina.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection '1; mode=block';
    add_header Referrer-Policy 'strict-origin-when-cross-origin';
    add_header Permissions-Policy 'camera=(), microphone=(), geolocation=(self)';

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /_next/image/ {
        proxy_pass http://127.0.0.1:3000;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\\.ht          { deny all; }
    location ~ /\.git         { deny all; }
    location ~ /\.env         { deny all; }
}
