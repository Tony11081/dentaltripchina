version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dentaltripchina-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=https://dentaltripchina.com
      - NEXT_PUBLIC_GA_ID=G-XXXXXXXXXX
      - NEXT_PUBLIC_WHATSAPP_NUMBER=8613800138000
      - NEXT_PUBLIC_USD_GBP_RATE=0.79
      - NEXT_PUBLIC_USD_AUD_RATE=1.55
    restart: unless-stopped
    networks:
      - dentaltripchina

networks:
  dentaltripchina:
    driver: bridge
